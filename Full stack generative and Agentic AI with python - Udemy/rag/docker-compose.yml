version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333" # HTTP API (Used by Python SDK/OpenAI Client)
      - "6334:6334" # gRPC API (For high-speed vector operations)
    environment:
      - QDRANT__LOGGER__LEVEL=INFO
